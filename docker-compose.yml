version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      # Copy .env.example to .env and fill in real values before running.
      # .env is gitignored so secrets stay off GitHub.
      - .env
    volumes:
      # Named volume keeps the SQLite database alive across container rebuilds
      - helpdesk-data:/app/data

volumes:
  helpdesk-data:
